<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交際費・会議費 判定ボット</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
#app {
  display: flex; flex-direction: column;
  width: 100%; max-width: 560px;
  height: 90vh; max-height: 740px;
  background: #fff; border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,.10);
  overflow: hidden;
}
#header { padding: 14px 20px; background: #185FA5; color: #fff; }
#header h1 { font-size: 15px; font-weight: 600; }
#header p  { font-size: 11px; opacity: .85; margin-top: 3px; }

/* タブ */
#tab-bar { display: flex; border-bottom: 2px solid #e2e8f0; background: #fff; }
.tab-btn {
  flex: 1; padding: 10px 0; font-size: 13px; font-weight: 600;
  font-family: inherit; border: none; background: transparent;
  color: #8a9ab0; cursor: pointer;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: color .15s, border-color .15s;
}
.tab-btn.active { color: #185FA5; border-bottom-color: #185FA5; }
.tab-btn:hover:not(.active) { color: #185FA5; background: #f0f6fc; }

/* チャットパネル */
#chat-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
#chat-panel.hidden { display: none; }
#messages {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 12px;
  background: #f7f9fc;
}
.msg { display: flex; gap: 8px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; flex-shrink: 0;
}
.bot-av  { background: #185FA5; color: #fff; }
.user-av { background: #e0e7ef; color: #185FA5; }
.bubble {
  max-width: 84%; padding: 10px 14px; font-size: 14px;
  line-height: 1.65; white-space: pre-wrap; word-break: break-word;
}
.msg.bot  .bubble { background:#fff; color:#1a1a2e; border-radius:4px 16px 16px 16px; border:1px solid #e2e8f0; }
.msg.user .bubble { background:#185FA5; color:#fff; border-radius:16px 4px 16px 16px; }

/* バッジ */
.badge {
  display: inline-block; margin-bottom: 8px; padding: 2px 10px;
  border-radius: 12px; font-size: 11px; font-weight: 700;
}
.badge-consul { background: #EBF2FA; color: #185FA5; border: 1px solid #185FA5; }

/* 選択ボタン */
.choices { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.choice-btn {
  background: #fff; border: 1.5px solid #185FA5; color: #185FA5;
  padding: 7px 13px; border-radius: 20px; font-size: 13px;
  cursor: pointer; transition: background .15s; font-family: inherit;
}
.choice-btn:hover    { background: #e6f1fb; }
.choice-btn:disabled { opacity: .45; cursor: default; }

/* 結果カード */
.result-card {
  margin-top: 10px; padding: 13px 14px;
  border-radius: 10px; font-size: 13px; line-height: 1.75;
}
.result-card.no1 { background: #FFF0EE; border-left: 4px solid #c0392b; color: #4a1b0c; }
.result-card.no2 { background: #FCDDD9; border-left: 4px solid #a93226; color: #4a1b0c; }
.result-card.no3 { background: #F0F8EA; border-left: 4px solid #3B6D11; color: #27500A; }
.result-card.no4 { background: #DDF0E0; border-left: 4px solid #2E6B2B; color: #1a3e18; }
.result-card.no5    { background: #E8F8F3; border-left: 4px solid #0F6E56; color: #04342C; }
.result-card.wework { background: #F3F0FF; border-left: 4px solid #6B46C1; color: #2D1B69; }

.result-tag  { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.result-row  { margin-bottom: 4px; font-size: 13px; }
.result-row span.lbl { opacity: .65; margin-right: 4px; }

.result-kamoku {
  display: inline-block; margin-bottom: 8px;
  padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 700;
}
.kamoku-no1 { background: #c0392b; color: #fff; }
.kamoku-no2 { background: #a93226; color: #fff; }
.kamoku-no3 { background: #3B6D11; color: #fff; }
.kamoku-no4 { background: #2E6B2B; color: #fff; }
.kamoku-no5    { background: #0F6E56; color: #fff; }
.kamoku-wework { background: #6B46C1; color: #fff; }

.result-app { margin: 6px 0; font-size: 12px; opacity: .8; }
.result-shinsei {
  margin-top: 8px; padding: 7px 12px; border-radius: 8px;
  font-size: 13px; font-weight: 700; background: #fff;
  border: 2px solid currentColor; display: inline-block;
}
.result-card.no1 .result-shinsei { color: #c0392b; }
.result-card.no2 .result-shinsei { color: #a93226; }
.result-card.no3 .result-shinsei { color: #3B6D11; }
.result-card.no4 .result-shinsei { color: #2E6B2B; }
.result-card.no5    .result-shinsei { color: #0F6E56; }
.result-card.wework .result-shinsei { color: #6B46C1; }

.result-note {
  margin-top: 8px; font-size: 11px; opacity: .65;
  border-top: 1px solid rgba(0,0,0,.08); padding-top: 6px;
}

.restart-btn {
  margin-top: 10px; background: transparent;
  border: 1px solid #aab8c8; color: #5a7a99;
  padding: 6px 14px; border-radius: 20px; font-size: 12px;
  cursor: pointer; font-family: inherit; display: inline-block;
}
.restart-btn:hover { background: #e6f1fb; }

#input-area {
  padding: 12px 16px; border-top: 1px solid #e2e8f0;
  display: flex; gap: 8px; background: #fff;
}
#input-area input {
  flex: 1; padding: 9px 14px; border: 1px solid #cdd5df;
  border-radius: 24px; font-size: 14px; font-family: inherit;
  outline: none; color: #1a1a2e; background: #f7f9fc;
}
#input-area input:focus { border-color: #185FA5; background: #fff; }
#input-area button {
  background: #185FA5; color: #fff; border: none; border-radius: 24px;
  padding: 9px 18px; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500;
}
#input-area button:hover { background: #0C447C; }

/* 検索パネル */
#search-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
#search-panel.visible { display: flex; }
#search-box-wrap { padding: 12px 16px 8px; background: #fff; border-bottom: 1px solid #e2e8f0; }
#search-input-wrap { position: relative; }
#search-input {
  width: 100%; padding: 9px 36px 9px 14px;
  border: 1.5px solid #cdd5df; border-radius: 24px;
  font-size: 14px; font-family: inherit; outline: none;
  color: #1a1a2e; background: #f7f9fc;
}
#search-input:focus { border-color: #185FA5; background: #fff; }
#search-clear {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: #aab8c8; font-size: 16px; padding: 0; display: none;
}
#search-results { flex: 1; overflow-y: auto; padding: 10px 14px; background: #f7f9fc; }
.search-hint { text-align: center; color: #aab8c8; font-size: 13px; margin-top: 40px; line-height: 1.8; }
.no-result    { text-align: center; color: #aab8c8; font-size: 13px; margin-top: 32px; }

.sri {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
  padding: 12px 14px; margin-bottom: 10px;
  transition: box-shadow .15s, border-color .15s;
}
.sri:hover { box-shadow: 0 2px 10px rgba(24,95,165,.12); border-color: #185FA5; }
.sri-head { margin-bottom: 5px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.sri-type {
  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
}
.sri-type.no1,.sri-type.no2 { background: #fff0ee; color: #c0392b; }
.sri-type.no3,.sri-type.no4 { background: #f0f8ea; color: #3B6D11; }
.sri-type.no5               { background: #e8f8f3; color: #0F6E56; }
.sri-type.wework            { background: #F3F0FF; color: #6B46C1; }
.sri-kamoku-badge {
  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  background: #EBF2FA; color: #185FA5;
}
.sri-title  { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
.sri-detail { font-size: 12px; color: #555; margin-bottom: 6px; line-height: 1.6; }
.sri-shinsei {
  display: inline-block; margin-top: 4px; padding: 4px 10px;
  border-radius: 6px; font-size: 12px; font-weight: 700; border: 1.5px solid;
}
.sri.no1 .sri-shinsei,.sri.no2 .sri-shinsei { border-color: #c0392b; color: #c0392b; }
.sri.no3 .sri-shinsei,.sri.no4 .sri-shinsei { border-color: #3B6D11; color: #3B6D11; }
.sri.no5    .sri-shinsei { border-color: #0F6E56; color: #0F6E56; }
.sri.wework .sri-shinsei { border-color: #6B46C1; color: #6B46C1; }

#footer { text-align: center; font-size: 11px; color: #aaa; padding: 6px; background: #fff; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>交際費・会議費 判定ボット【事前申請用】</h1>
    <p>交際費会議費規程（2026年6月1日制定）に基づき自動判定します</p>
  </div>

  <div id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('chat')">💬 ステップ判定</button>
    <button class="tab-btn"        onclick="switchTab('search')">🔍 キーワード検索</button>
  </div>

  <div id="chat-panel">
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="user-input" placeholder="ボタンで選択してください" readonly />
      <button onclick="sendText()">送信</button>
    </div>
  </div>

  <div id="search-panel">
    <div id="search-box-wrap">
      <div id="search-input-wrap">
        <input type="text" id="search-input"
          placeholder="例：手土産　飲酒　茶菓子　懇親会…"
          oninput="onSearchInput()" />
        <button id="search-clear" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <div id="search-results">
      <div class="search-hint">費用に関するキーワードを入力してください<br>例：「手土産」「飲酒あり」「茶菓子」「会議室」「懇親会」</div>
    </div>
  </div>

  <div id="footer">Copyright © 2026 Qolony All rights reserved.</div>
</div>

<script>
// =============================================
// 申請書名 定数
// =============================================
const SHINSEI = {
  no1: '【事前申請】No1 交際費（売上原価）_FY26',
  no2: '【事前申請】No2 交際費（販管費）_FY26',
  no3: '【事前申請】No3 会議費（売上原価）_FY26',
  no4: '【事前申請】No4 会議費（販管費）_FY26',
  no5: '【事前申請】No5 福利厚生費（全社懇親会費）_FY26',
};
const APPROVAL_CFO  = 'CFO決裁（予算外）／上場準備室長（予算内）';
const APPROVAL_MGR  = '各チームマネージャー';
const NOTE_SOCIAL   = '※ 社内／社外の区別は申請書の中で入力してください';

// =============================================
// state
// =============================================
let state = { step: 'start', consultant: null };

// =============================================
// 判定ツリー（判定結果一覧表 No1〜15 完全対応）
// =============================================
const questions = {

  // Q1: 全社懇親会？
  start: {
    text: 'こんにちは！交際費・会議費の事前申請の判定をお手伝いします。\n\nまず、費用の種類を教えてください。',
    choices: [
      { label: '全社員参加の懇親会・社員旅行', key: 'shinkon' },
      { label: '上記以外（接待・飲食・会議費など）', key: 'other' },
    ],
    next: k => k === 'shinkon' ? 'result_no5' : 'ask_consultant',
  },

  // Q2: コンサルタント有無
  ask_consultant: {
    text: '今回の費用に【コンサルタント（業務委託の社外スタッフ）】は参加していますか？',
    badge: '科目区分の確認',
    choices: [
      { label: 'はい（コンサルタントが参加する）', key: 'yes' },
      { label: 'いいえ（参加しない）',             key: 'no'  },
    ],
    next: k => { state.consultant = (k === 'yes'); return 'ask_type'; },
  },

  // Q3: 費用の種類
  ask_type: {
    text: '費用の内容を教えてください。',
    choices: [
      { label: '会議室使用料（WeWork）',        key: 'room_ww'  },
      { label: '会議室使用料（WeWork以外）',     key: 'room'     },
      { label: '接待・贈答（ゴルフ・観劇・手土産・慶弔見舞など）', key: 'settai'  },
      { label: '飲食費（食事・会食など）',       key: 'dining'   },
    ],
    next: k => {
      if (k === 'room_ww') return 'result_room_wework';
      if (k === 'room')    return state.consultant ? 'result_room_no3' : 'result_room_no4';
      if (k === 'settai')  return state.consultant ? 'result_no1_settai' : 'result_no2_settai';
      return 'ask_drinking';
    },
  },

  // Q4: 飲酒あり？
  ask_drinking: {
    text: '飲食の中に、お酒（アルコール）を飲んだ人は1名でもいますか？',
    choices: [
      { label: 'はい（1名でも飲酒あり）',     key: 'yes' },
      { label: 'いいえ（全員ノンアルコール）', key: 'no'  },
    ],
    next: k => {
      if (k === 'yes') return state.consultant ? 'result_no1_drink' : 'result_no2_drink';
      return 'ask_cost';
    },
  },

  // Q5: 1人あたり金額
  ask_cost: {
    text: '1人あたりの飲食費用（税抜）はいくらですか？',
    choices: [
      { label: '1万円以下（ちょうど1万円はここ）', key: 'low'  },
      { label: '1万円超',                           key: 'high' },
    ],
    next: k => {
      if (k === 'high') return state.consultant ? 'result_no1_high' : 'result_no2_high';
      return 'ask_agenda';
    },
  },

  // Q6: 議題あり？
  ask_agenda: {
    text: '具体的な議題・目的（業務上の話し合いなど）はありますか？',
    choices: [
      { label: 'はい（明確な議題・目的あり）', key: 'yes' },
      { label: 'いいえ（懇親・親睦のみ）',     key: 'no'  },
    ],
    next: k => {
      if (k === 'no') return state.consultant ? 'result_no1_shinbo' : 'result_no2_shinbo';
      return 'ask_member';
    },
  },

  // Q7: 社内のみ？
  ask_member: {
    text: '参加者は社内従業員のみですか？',
    choices: [
      { label: '社内従業員のみ（社外参加者なし）', key: 'yes' },
      { label: '社外参加者（取引先・顧客等）がいる', key: 'no' },
    ],
    next: k => {
      if (k === 'no') return state.consultant ? 'result_no3_gaisha' : 'result_no4_gaisha';
      return 'ask_snack';
    },
  },

  // Q8: 茶菓子・軽食のみ？（社内のみルート）
  ask_snack: {
    text: '会議室で提供する茶菓子・軽食のみですか？\n（1人あたり税抜1千円以下）',
    choices: [
      { label: '茶菓子・軽食のみ（1人1千円以下）', key: 'yes' },
      { label: 'それ以上・または該当しない',         key: 'no'  },
    ],
    next: k => {
      if (k === 'yes') return state.consultant ? 'result_no3_snack' : 'result_no4_snack';
      return 'ask_cost_naibu'; // 社内飲食の金額チェック
    },
  },

  // Q9: 社内飲食・1万円以下？
  ask_cost_naibu: {
    text: '1人あたりの飲食費用（税抜）はいくらですか？',
    choices: [
      { label: '1万円以下（ちょうど1万円はここ）', key: 'low'  },
      { label: '1万円超',                           key: 'high' },
    ],
    next: k => {
      if (k === 'high') return state.consultant ? 'result_no1_naibu_high' : 'result_no2_naibu_high';
      return state.consultant ? 'result_no3_naibu' : 'result_no4_naibu';
    },
  },
};

// =============================================
// 結果定義（判定結果一覧表 No1〜15 完全対応）
// =============================================
const results = {
  // ===== No1 交際費（売上原価）=====
  result_no1_settai: {
    no: 'no1', title: '→ 交際費（売上原価）',
    hantei: '接待・贈答・ゴルフ・観劇・手土産・慶弔見舞（飲酒有無問わず）',
    detail: 'コンサルタントが参加する得意先等への接待・供応・贈答・旅行・観劇・ゴルフ、慶弔見舞、記念式典宴会費など',
    approval: APPROVAL_CFO, shinsei: SHINSEI.no1, note: NOTE_SOCIAL,
  },
  result_no1_drink: {
    no: 'no1', title: '→ 交際費（売上原価）',
    hantei: '飲酒を伴う飲食',
    detail: 'コンサルタントが参加する飲食で、1名でも飲酒した場合',
    approval: APPROVAL_CFO, shinsei: SHINSEI.no1, note: NOTE_SOCIAL,
  },
  result_no1_high: {
    no: 'no1', title: '→ 交際費（売上原価）',
    hantei: '1人あたり税抜1万円超の飲食',
    detail: 'コンサルタントが参加し、参加者1人あたりの飲食費（税抜）が10,000円を超えるもの',
    approval: APPROVAL_CFO, shinsei: SHINSEI.no1, note: NOTE_SOCIAL,
  },
  result_no1_shinbo: {
    no: 'no1', title: '→ 交際費（売上原価）',
    hantei: '議題なし・懇親・親睦目的の飲食',
    detail: 'コンサルタントが参加し、具体的な議題・業務目的がなく懇親・親睦のみを目的とする飲食',
    approval: APPROVAL_CFO, shinsei: SHINSEI.no1, note: NOTE_SOCIAL,
  },
  result_no1_naibu_high: {
    no: 'no1', title: '→ 交際費（売上原価）',
    hantei: '社内のみ・飲酒なし・1万円超の飲食',
    detail: 'コンサルタントが参加。社内従業員のみで飲酒なし・議題ありの飲食だが、1人あたり税抜1万円超の場合は交際費',
    approval: APPROVAL_CFO, shinsei: SHINSEI.no1, note: '',
  },

  // ===== No2 交際費（販管費）=====
  result_no2_settai: {
    no: 'no2', title: '→ 交際費（販管費）',
    hantei: '接待・贈答・ゴルフ・観劇・手土産・慶弔見舞（飲酒有無問わず）',
    detail: 'コンサルタント不参加。得意先等への接待・供応・贈答・旅行・観劇・ゴルフ、慶弔見舞、記念式典宴会費など',
    approval: APPROVAL_CFO, shinsei: SHINSEI.no2, note: NOTE_SOCIAL,
  },
  result_no2_drink: {
    no: 'no2', title: '→ 交際費（販管費）',
    hantei: '飲酒を伴う飲食',
    detail: 'コンサルタント不参加の飲食で、1名でも飲酒した場合（社内のみ・社外参加問わず）',
    approval: APPROVAL_CFO, shinsei: SHINSEI.no2, note: NOTE_SOCIAL,
  },
  result_no2_high: {
    no: 'no2', title: '→ 交際費（販管費）',
    hantei: '1人あたり税抜1万円超の飲食',
    detail: 'コンサルタント不参加で、参加者1人あたりの飲食費（税抜）が10,000円を超えるもの',
    approval: APPROVAL_CFO, shinsei: SHINSEI.no2, note: NOTE_SOCIAL,
  },
  result_no2_shinbo: {
    no: 'no2', title: '→ 交際費（販管費）',

// DOM
// =============================================
const msgs    = document.getElementById('messages');
const inputEl = document.getElementById('user-input');

function addMsg(role, text, choices, badge) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role === 'bot' ? 'bot-av' : 'user-av'}`;
  av.textContent = role === 'bot' ? 'AI' : '私';
  const bub = document.createElement('div');
  bub.className = 'bubble';

  if (badge) {
    const b = document.createElement('div');
    b.className = `badge badge-consul`;
    b.textContent = badge;
    bub.appendChild(b);
    bub.appendChild(document.createElement('br'));
  }
  bub.appendChild(document.createTextNode(text));

  if (choices) {
    const cd = document.createElement('div');
    cd.className = 'choices';
    choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c.label;
      btn.onclick = () => handleChoice(c);
      cd.appendChild(btn);
    });
    bub.appendChild(cd);
  }
  div.appendChild(av);
  div.appendChild(bub);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addResult(key) {
  const r = results[key];
  const div = document.createElement('div');
  div.className = 'msg bot';
  const av = document.createElement('div');
  av.className = 'avatar bot-av';
  av.textContent = 'AI';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.appendChild(document.createTextNode('判定が完了しました！'));

  const card = document.createElement('div');
  card.className = `result-card ${r.no}`;

  // No別ラベルマップ
  const kamokuMap = {
    no1: { text: '売上原価', cls: 'kamoku-no1' },
    no2: { text: '販管費',   cls: 'kamoku-no2' },
    no3: { text: '売上原価', cls: 'kamoku-no3' },
    no4: { text: '販管費',   cls: 'kamoku-no4' },
    no5:    { text: '原価/販管費の区別なし', cls: 'kamoku-no5' },
    wework: { text: 'WeWork専用申請',         cls: 'kamoku-wework' },
  };
  const km = kamokuMap[r.no];

  // タイトル
  const tag = document.createElement('div');
  tag.className = 'result-tag';
  tag.textContent = r.title;
  card.appendChild(tag);

  // 科目バッジ
  const kb = document.createElement('span');
  kb.className = `result-kamoku ${km.cls}`;
  kb.textContent = km.text;
  card.appendChild(kb);
  card.appendChild(document.createElement('br'));

  // 判定区分
  const hd = document.createElement('div');
  hd.className = 'result-row';
  hd.innerHTML = `<span class="lbl">判定：</span>${r.hantei}`;
  card.appendChild(hd);

  // 詳細
  const dd = document.createElement('div');
  dd.className = 'result-row';
  dd.style.marginBottom = '6px';
  dd.innerHTML = `<span class="lbl">内容：</span>${r.detail}`;
  card.appendChild(dd);

  // 承認者
  const ap = document.createElement('div');
  ap.className = 'result-app';
  ap.textContent = `【承認者】${r.approval}`;
  card.appendChild(ap);

  // 申請書
  const ns = document.createElement('div');
  ns.className = 'result-shinsei';
  if (r.url) {
    const a = document.createElement('a');
    a.href = r.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.textContent = `📋 ${r.shinsei}`;
    a.style.cssText = 'color:inherit;text-decoration:underline;';
    ns.appendChild(a);
    const ic = document.createElement('span');
    ic.textContent = ' ↗';
    ic.style.cssText = 'font-size:11px;opacity:.7;';
    ns.appendChild(ic);
  } else {
    ns.textContent = `📋 ${r.shinsei}`;
  }
  card.appendChild(ns);

  // 注意書き
  if (r.note) {
    const nt = document.createElement('div');
    nt.className = 'result-note';
    nt.textContent = r.note;
    card.appendChild(nt);
  }

  bub.appendChild(card);
  const rb = document.createElement('button');
  rb.className = 'restart-btn';
  rb.textContent = '↺ もう一度判定する';
  rb.onclick = restart;
  bub.appendChild(rb);

  div.appendChild(av);
  div.appendChild(bub);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function handleChoice(choice) {
  document.querySelectorAll('.choice-btn').forEach(b => { b.disabled = true; });
  addMsg('user', choice.label);
  const q = questions[state.step];
  const next = q.next(choice.key);
  state.step = next;
  setTimeout(() => {
    if (results[next]) {
      addResult(next);
    } else if (questions[next]) {
      const nq = questions[next];
      addMsg('bot', nq.text, nq.choices, nq.badge || null);
    }
  }, 350);
}

function sendText() { addMsg('bot', '上のボタンから選択してください。'); }

function restart() {
  state = { step: 'start', consultant: null };
  msgs.innerHTML = '';
  const q = questions['start'];
  addMsg('bot', q.text, q.choices);
}

inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendText(); });

// 初期表示
addMsg('bot', questions['start'].text, questions['start'].choices);

// =============================================
function switchTab(tab) {
  const cp   = document.getElementById('chat-panel');
  const sp   = document.getElementById('search-panel');
  const tabs = document.querySelectorAll('.tab-btn');
  if (tab === 'chat') {
    cp.classList.remove('hidden'); sp.classList.remove('visible');
    tabs[0].classList.add('active'); tabs[1].classList.remove('active');
  } else {
    cp.classList.add('hidden'); sp.classList.add('visible');
    tabs[0].classList.remove('active'); tabs[1].classList.add('active');
    document.getElementById('search-input').focus();
  }
}

// =============================================
function onSearchInput() {
  const q = document.getElementById('search-input').value.trim();
  document.getElementById('search-clear').style.display = q ? 'block' : 'none';
  renderSearchResults(q);
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  renderSearchResults('');
}
function renderSearchResults(q) {
  const con = document.getElementById('search-results');
  if (!q) {
    con.innerHTML = '<div class="search-hint">費用に関するキーワードを入力してください<br>例：「手土産」「飲酒あり」「茶菓子」「会議室」「懇親会」</div>';
    return;
  }
  const tokens = q.replace(/　/g,' ').split(/\s+/).filter(Boolean);
  const scored = searchIndex.map(item => {
    const target = (item.title + item.detail + item.keywords.join(' ')).toLowerCase();
    let score = 0;
    for (const t of tokens) {
      const tl = t.toLowerCase();
      if (item.keywords.some(k => k.includes(tl) || tl.includes(k))) score += 3;
      else if (target.includes(tl)) score += 1;
    }
    return { item, score };
  }).filter(x => x.score > 0).sort((a,b) => b.score - a.score);

  if (!scored.length) {
    con.innerHTML = `<div class="no-result">「${q}」に一致する結果が見つかりませんでした。<br>別のキーワードでお試しください。</div>`;
    return;
  }

  // 重複排除（同じshinseiが連続する場合は先頭のみ）
  const seen = new Set();
  const deduped = scored.filter(({ item }) => {
    const key = item.shinsei + item.title;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  con.innerHTML = deduped.map(({ item: r }) => `
    <div class="sri ${r.no}">
      <div class="sri-head">
        <span class="sri-type ${r.no}">${r.typeLabel}</span>
      </div>
      <div class="sri-title">${r.title}</div>
      <div class="sri-detail">${r.detail}</div>
      <div>${r.url
        ? `<a href="${r.url}" target="_blank" rel="noopener noreferrer" class="sri-shinsei" style="text-decoration:underline;">📋 ${r.shinsei} ↗</a>`
        : `<span class="sri-shinsei">📋 ${r.shinsei}</span>`
      }</div>
    </div>`
  ).join('');
}
</script>
</body>
</html>
